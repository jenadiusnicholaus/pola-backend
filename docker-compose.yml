# ==========================================
# Docker Compose for Local Development
# ==========================================
# Usage:
#   Start services:    docker-compose up -d
#   View logs:         docker-compose logs -f
#   Stop services:     docker-compose down
#   Rebuild:           docker-compose up -d --build
# ==========================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pola_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pola_db}
      POSTGRES_USER: ${DB_USER:-pola_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pola_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups # Mount backup directory
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-pola_user} -d ${DB_NAME:-pola_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pola_network

  # Django Backend Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: pola_web
    restart: unless-stopped
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - DB_NAME=${DB_NAME:-pola_db}
      - DB_USER=${DB_USER:-pola_user}
      - DB_PASSWORD=${DB_PASSWORD:-pola_password}
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,192.168.1.133
      - CORS_ALLOW_ALL_ORIGINS=True
      # AzamPay settings
      - AZAM_PAY_APP_NAME=${AZAM_PAY_APP_NAME:-}
      - AZAM_PAY_CLIENT_ID=${AZAM_PAY_CLIENT_ID:-}
      - AZAM_PAY_CLIENT_SECRET=${AZAM_PAY_CLIENT_SECRET:-}
      - AZAM_PAY_PRODUCTION=False
    volumes:
      - .:/app # Mount source code for hot reload
      - ./media:/app/media
      - ./logs:/app/logs
      - ./static:/app/static
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - pola_network

  # Redis for caching (optional, uncomment if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: pola_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - pola_network

volumes:
  postgres_data:
  # redis_data:

networks:
  pola_network:
    driver: bridge
