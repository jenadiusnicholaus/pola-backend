# ==========================================
# Docker Compose for Production
# ==========================================
# Usage:
#   Start:    docker-compose -f docker-compose.prod.yml up -d
#   Logs:     docker-compose -f docker-compose.prod.yml logs -f
#   Stop:     docker-compose -f docker-compose.prod.yml down
#   Rebuild:  docker-compose -f docker-compose.prod.yml up -d --build
# ==========================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pola_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pola_network_prod
    # Do not expose ports externally in production
    # ports:
    #   - "5432:5432"

  # Django Backend Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pola_web_prod
    restart: always
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # Security settings
      - CSRF_COOKIE_SECURE=True
      - SESSION_COOKIE_SECURE=True
      # AzamPay settings
      - AZAM_PAY_APP_NAME=${AZAM_PAY_APP_NAME}
      - AZAM_PAY_CLIENT_ID=${AZAM_PAY_CLIENT_ID}
      - AZAM_PAY_CLIENT_SECRET=${AZAM_PAY_CLIENT_SECRET}
      - AZAM_PAY_PRODUCTION=True
      - AZAM_PAY_WEBHOOK_URL=${AZAM_PAY_WEBHOOK_URL}
    volumes:
      - media_data:/app/media
      - static_data:/app/static
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pola_network_prod
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pola_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_data:/app/static:ro
      - media_data:/app/media:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - pola_network_prod

  # Certbot for SSL certificates (optional)
  certbot:
    image: certbot/certbot
    container_name: pola_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - pola_network_prod

volumes:
  postgres_data_prod:
  media_data:
  static_data:

networks:
  pola_network_prod:
    driver: bridge
