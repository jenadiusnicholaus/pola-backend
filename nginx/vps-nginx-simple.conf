# ==========================================
# POLA Backend Nginx Configuration - Simple
# ==========================================
# Usage:
# 1. Update /path/to/your/project with your actual path
# 2. Copy: sudo cp vps-nginx-simple.conf /etc/nginx/sites-available/pola-backend
# 3. Enable: sudo ln -s /etc/nginx/sites-available/pola-backend /etc/nginx/sites-enabled/
# 4. Test: sudo nginx -t
# 5. Reload: sudo systemctl reload nginx
# 6. Get SSL: sudo certbot --nginx -d api.pola.co.tz
# ==========================================

# Upstream Django application (Docker containers)
upstream pola_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# HTTP Server
server {
    listen 80;
    server_name api.pola.co.tz www.api.pola.co.tz;

    # Allow certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Static files
    location /static/ {
        alias /path/to/your/project/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /path/to/your/project/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API endpoints with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://pola_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests (admin, etc.)
    location / {
        proxy_pass http://pola_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
